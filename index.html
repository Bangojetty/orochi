<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orochi</title>
<style>
  :root {
    --bg: #0f1115;
    --sidebar: #14161c;
    --accent: #7c5cff;
    --accent-2: #00d4a0;
    --text: #e7e9ee;
    --muted: #8b90a0;
    --danger: #ff5c6c;
    --border: #262a33;
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    flex: 0 0 220px;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 18px 12px;
  }
  .sidebar .brand {
    padding: 6px 10px 18px;
  }
  .sidebar .brand h1 {
    font-size: 17px;
    margin: 0;
    letter-spacing: 1px;
    font-weight: 700;
  }
  .nav { display: flex; flex-direction: column; gap: 4px; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    border: 1px solid transparent;
    transition: background 0.12s ease, color 0.12s ease;
  }
  .nav-item:hover { background: #1b1e26; color: var(--text); }
  .nav-item.active {
    background: #1f2230;
    color: var(--text);
    border-color: var(--border);
  }
  .nav-item .icon {
    width: 20px;
    text-align: center;
    font-size: 16px;
  }
  .sidebar .footer {
    margin-top: auto;
    padding: 10px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.4px;
  }

  /* ---------- Content ---------- */
  .content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: auto;
  }
  .tool { display: none; width: 100%; }
  .tool.active { display: flex; flex-direction: column; align-items: center; }

  .tool h2 {
    font-size: 22px;
    margin: 0 0 18px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  /* ---------- Counter ---------- */
  .count {
    font-size: 88px;
    font-weight: 700;
    text-align: center;
    line-height: 1;
    margin: 0 0 6px;
    font-variant-numeric: tabular-nums;
    transition: transform 0.08s ease;
  }
  .count.bump { transform: scale(1.08); }
  .hint {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 18px;
  }
  .hint kbd {
    background: #11141b;
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 6px;
    padding: 2px 8px;
    font-family: ui-monospace, "Cascadia Code", monospace;
    font-size: 12px;
    color: var(--accent);
  }
  .row { display: flex; gap: 10px; justify-content: center; margin-bottom: 18px; }
  button {
    cursor: pointer;
    border: 1px solid var(--border);
    background: #1f232c;
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    padding: 9px 16px;
    border-radius: 10px;
    transition: background 0.15s ease, transform 0.05s ease;
  }
  button:hover { background: #262b36; }
  button:active { transform: translateY(1px); }
  button.primary {
    background: linear-gradient(135deg, var(--accent), #5a3fd6);
    border-color: transparent;
    font-size: 18px;
    padding: 8px 18px;
    line-height: 1;
  }
  button.primary:hover { filter: brightness(1.08); }
  button.danger { color: var(--danger); }

  .settings {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .settings label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .keybind { display: flex; gap: 8px; align-items: center; }
  #keyDisplay {
    width: 110px;
    background: #11141b;
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 8px 10px;
    font-family: ui-monospace, "Cascadia Code", monospace;
    font-size: 13px;
    color: var(--accent);
    text-align: center;
  }
  #keyDisplay.listening {
    color: var(--accent-2);
    border-color: var(--accent-2);
    box-shadow: 0 0 0 2px rgba(0,212,160,0.15);
  }
  #rebind { padding: 8px 12px; font-size: 13px; }
</style>
</head>
<body>
  <!-- ---------- Sidebar ---------- -->
  <aside class="sidebar">
    <div class="brand">
      <h1>OROCHI</h1>
    </div>
    <nav class="nav" id="nav">
      <div class="nav-item active" data-tool="counter">
        <span class="icon">#</span>
        <span>Counter</span>
      </div>
    </nav>
    <div class="footer">v0.1.0</div>
  </aside>

  <!-- ---------- Content ---------- -->
  <main class="content">

    <!-- Counter -->
    <section class="tool active" data-tool="counter">
      <h2>Counter</h2>
      <div class="count" id="count">0</div>
      <div class="hint">Press <kbd id="hintKey">Space</kbd> to count up</div>

      <div class="row">
        <button class="primary" id="increment" title="Count up">+</button>
        <button class="danger" id="reset">Reset</button>
      </div>

      <div class="settings">
        <label for="keyDisplay">Hotkey</label>
        <div class="keybind">
          <div id="keyDisplay" tabindex="0">Space</div>
          <button id="rebind">Rebind</button>
        </div>
      </div>
    </section>

  </main>

<script>
/* ---------- Sidebar navigation ---------- */
(function () {
  "use strict";
  var ACTIVE_KEY = "orochi.activeTool.v1";
  var navItems = document.querySelectorAll(".nav-item");
  var tools = document.querySelectorAll(".tool");

  function activate(name) {
    navItems.forEach(function (n) {
      n.classList.toggle("active", n.getAttribute("data-tool") === name);
    });
    tools.forEach(function (t) {
      t.classList.toggle("active", t.getAttribute("data-tool") === name);
    });
    try { localStorage.setItem(ACTIVE_KEY, name); } catch (e) {}
  }

  navItems.forEach(function (n) {
    n.addEventListener("click", function () {
      activate(n.getAttribute("data-tool"));
    });
  });

  // Restore last-open tool.
  try {
    var saved = localStorage.getItem(ACTIVE_KEY);
    if (saved && document.querySelector('.tool[data-tool="' + saved + '"]')) {
      activate(saved);
    }
  } catch (e) {}
})();

/* ---------- Counter ---------- */
(function () {
  "use strict";

  var STORAGE_KEY = "orochi.tracker.v1";

  var state = {
    count: 0,
    hotkey: { key: " ", label: "Space" }
  };

  var countEl = document.getElementById("count");
  var hintKeyEl = document.getElementById("hintKey");
  var keyDisplayEl = document.getElementById("keyDisplay");
  var incrementBtn = document.getElementById("increment");
  var resetBtn = document.getElementById("reset");
  var rebindBtn = document.getElementById("rebind");

  var listeningForKey = false;

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var saved = JSON.parse(raw);
        if (typeof saved.count === "number") state.count = saved.count;
        if (saved.hotkey && saved.hotkey.key) state.hotkey = saved.hotkey;
      }
    } catch (e) { /* ignore corrupt storage */ }
  }

  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) { /* storage may be unavailable on file:// in some browsers */ }
  }

  function render() {
    countEl.textContent = state.count;
    keyDisplayEl.textContent = state.hotkey.label;
    hintKeyEl.textContent = state.hotkey.label;
  }

  function bump() {
    countEl.classList.remove("bump");
    void countEl.offsetWidth; // force reflow so the animation restarts
    countEl.classList.add("bump");
  }

  function increment() {
    state.count++;
    render();
    bump();
    save();
  }

  function reset() {
    state.count = 0;
    render();
    save();
  }

  // Turn a keydown event into a stored key + a friendly label.
  function describeKey(e) {
    var key = e.key;
    var label;
    if (key === " ") label = "Space";
    else if (key === "ArrowUp") label = "↑";
    else if (key === "ArrowDown") label = "↓";
    else if (key === "ArrowLeft") label = "←";
    else if (key === "ArrowRight") label = "→";
    else if (key === "Enter") label = "Enter";
    else if (key.length === 1) label = key.toUpperCase();
    else label = key;
    return { key: key, label: label };
  }

  function startListening() {
    listeningForKey = true;
    keyDisplayEl.classList.add("listening");
    keyDisplayEl.textContent = "Press a key…";
    keyDisplayEl.focus();
  }

  function stopListening() {
    listeningForKey = false;
    keyDisplayEl.classList.remove("listening");
    render();
  }

  document.addEventListener("keydown", function (e) {
    if (listeningForKey) {
      // Escape cancels the rebind without changing anything.
      if (e.key !== "Escape") {
        state.hotkey = describeKey(e);
        save();
      }
      e.preventDefault();
      stopListening();
      return;
    }

    // Only count while the Counter tool is visible.
    var counterVisible = document.querySelector('.tool[data-tool="counter"]').classList.contains("active");
    if (!counterVisible) return;

    // Ignore the hotkey while typing in an input (future-proofing).
    var tag = (e.target && e.target.tagName) || "";
    if (tag === "INPUT" || tag === "TEXTAREA") return;

    if (e.key === state.hotkey.key) {
      e.preventDefault();
      increment();
    }
  });

  incrementBtn.addEventListener("click", increment);
  resetBtn.addEventListener("click", reset);
  rebindBtn.addEventListener("click", function () {
    if (listeningForKey) stopListening();
    else startListening();
  });

  load();
  render();
})();
</script>
</body>
</html>
