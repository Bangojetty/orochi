<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Orochi Cursor</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: transparent;
    cursor: none;
    -webkit-user-select: none;
    user-select: none;
  }
  /* The whole graphic lives in one element that we translate to the pointer.
     It starts off-screen until the first position arrives. */
  #cur {
    position: fixed;
    top: 0;
    left: 0;
    transform: translate(-9999px, -9999px);
    will-change: transform;
    pointer-events: none;
  }
  #cur svg, #cur .inner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  #cur .inner {
    border-radius: 50%;
  }
</style>
</head>
<body>
  <div id="cur">
    <svg id="outer" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="inner" id="inner"></div>
  </div>
<script>
(function () {
  "use strict";
  if (!window.__TAURI__) return;
  var invoke = window.__TAURI__.core.invoke;
  var listen = window.__TAURI__.event.listen;

  var cur = document.getElementById("cur");
  var outer = document.getElementById("outer");
  var inner = document.getElementById("inner");

  var dpr = window.devicePixelRatio || 1;
  // Keep the DPR fresh if the window is dragged between monitors of different
  // scaling (best-effort; same-DPI setups are exact).
  window.addEventListener("resize", function () { dpr = window.devicePixelRatio || 1; });

  var cfg = {
    inner: { color: "#7c5cff", size: 6 },
    outer: { shape: "ring", color: "#63b341", size: 38 }
  };

  function strokeFor(size) {
    // Auto-derive a pleasant outline weight from the outer size.
    return Math.max(2, Math.round(size * 0.08));
  }

  function buildOuter() {
    var o = cfg.outer || {};
    var size = Math.max(2, +o.size || 0);
    var color = o.color || "#63b341";
    var shape = o.shape || "ring";
    var sw = strokeFor(size);
    // Pad so neither the stroke nor the inward chevrons (which reach ~0.13*size
    // past the radius) get clipped at the SVG edges.
    var pad = Math.ceil(Math.max(sw, size * 0.13) + 3);
    var box = size + pad * 2;
    var c = box / 2;
    var r = size / 2;
    outer.setAttribute("width", box);
    outer.setAttribute("height", box);
    outer.setAttribute("viewBox", "0 0 " + box + " " + box);

    var svg = "";
    if (shape === "square") {
      var s = c - r;
      svg = '<rect x="' + s + '" y="' + s + '" width="' + size + '" height="' + size +
            '" fill="none" stroke="' + color + '" stroke-width="' + sw + '"/>';
    } else if (shape === "chevrons") {
      // Four chevrons near each edge, each pointing inward toward the center.
      var arm = Math.max(4, size * 0.16); // half-length of each chevron leg
      var depth = Math.max(3, size * 0.13); // how deep the point reaches inward
      function chevron(cx, cy, dir) {
        // dir: 0=top,1=right,2=bottom,3=left. Point heads toward center.
        var p1, tip, p2;
        if (dir === 0) { p1 = [cx - arm, cy - depth]; tip = [cx, cy]; p2 = [cx + arm, cy - depth]; }
        else if (dir === 2) { p1 = [cx - arm, cy + depth]; tip = [cx, cy]; p2 = [cx + arm, cy + depth]; }
        else if (dir === 3) { p1 = [cx - depth, cy - arm]; tip = [cx, cy]; p2 = [cx - depth, cy + arm]; }
        else { p1 = [cx + depth, cy - arm]; tip = [cx, cy]; p2 = [cx + depth, cy + arm]; }
        return '<polyline points="' + p1[0] + ',' + p1[1] + ' ' + tip[0] + ',' + tip[1] + ' ' +
               p2[0] + ',' + p2[1] + '" fill="none" stroke="' + color + '" stroke-width="' + sw +
               '" stroke-linecap="round" stroke-linejoin="round"/>';
      }
      svg =
        chevron(c, c - r, 0) +
        chevron(c + r, c, 1) +
        chevron(c, c + r, 2) +
        chevron(c - r, c, 3);
    } else {
      // ring (default)
      svg = '<circle cx="' + c + '" cy="' + c + '" r="' + r +
            '" fill="none" stroke="' + color + '" stroke-width="' + sw + '"/>';
    }
    outer.innerHTML = svg;
  }

  function buildInner() {
    var i = cfg.inner || {};
    var size = Math.max(1, +i.size || 1);
    inner.style.width = size + "px";
    inner.style.height = size + "px";
    inner.style.background = i.color || "#7c5cff";
  }

  function apply(newCfg) {
    if (!newCfg) return;
    if (newCfg.inner) cfg.inner = newCfg.inner;
    if (newCfg.outer) cfg.outer = newCfg.outer;
    buildInner();
    buildOuter();
  }

  // Pull the current config on load, then track live updates.
  invoke("cursor_get_config").then(apply).catch(function () { apply(cfg); });
  listen("cursor-config", function (ev) { apply(ev.payload); });

  // Position updates arrive as physical pixels relative to the overlay origin.
  listen("cursor-pos", function (ev) {
    var p = ev.payload || {};
    var x = (p.x || 0) / dpr;
    var y = (p.y || 0) / dpr;
    cur.style.transform = "translate(" + x + "px, " + y + "px)";
  });

  // Draw something immediately so the first frame isn't blank.
  apply(cfg);
})();
</script>
</body>
</html>
