<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orochi</title>
<style>
  :root {
    --bg: #0a0d0a;
    --sidebar: #0e120c;
    --accent: #63b341;
    --accent-2: #7c5cff;
    --text: #e9efe3;
    --muted: #889183;
    --danger: #ff5c6c;
    --border: #242b1f;
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    flex: 0 0 220px;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 18px 12px;
  }
  .sidebar .brand {
    padding: 6px 10px 18px;
  }
  .sidebar .brand h1 {
    font-size: 17px;
    margin: 0;
    letter-spacing: 1px;
    font-weight: 700;
    color: var(--accent-2);
  }
  .nav { display: flex; flex-direction: column; gap: 4px; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    border: 1px solid transparent;
    transition: background 0.12s ease, color 0.12s ease;
  }
  .nav-item:hover { background: #161c13; color: var(--text); }
  .nav-item.active {
    background: #1b2217;
    color: var(--text);
    border-color: var(--border);
    box-shadow: inset 2px 0 0 var(--accent-2);
  }
  .nav-item .icon {
    width: 20px;
    text-align: center;
    font-size: 16px;
  }
  .nav-item.active .icon { color: var(--accent-2); }
  .sidebar .footer {
    margin-top: auto;
    padding: 10px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.4px;
  }

  /* ---------- Content ---------- */
  .content {
    flex: 1;
    position: relative;
    display: flex;
    align-items: stretch;
    justify-content: center;
    padding: 24px;
    overflow: auto;
  }
  .reset-top {
    position: absolute;
    top: 18px;
    right: 18px;
  }
  .tool { display: none; width: 100%; }
  .tool.active { display: flex; flex-direction: column; align-items: center; }

  .tool h2 {
    font-size: 22px;
    margin: 0 0 18px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  /* ---------- Counter ---------- */
  .count {
    font-size: 88px;
    font-weight: 700;
    text-align: center;
    line-height: 1;
    margin: 0 0 6px;
    font-variant-numeric: tabular-nums;
    transition: transform 0.08s ease;
  }
  .count.bump { transform: scale(1.08); }
  .hint {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 18px;
  }
  .hint kbd {
    background: #0e130c;
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 6px;
    padding: 2px 8px;
    font-family: ui-monospace, "Cascadia Code", monospace;
    font-size: 12px;
    color: var(--accent);
  }
  .row { display: flex; gap: 10px; justify-content: center; margin-bottom: 18px; }
  button {
    cursor: pointer;
    border: 1px solid var(--border);
    background: #181f14;
    color: var(--text);
    font-size: 14px;
    font-weight: 600;
    padding: 9px 16px;
    border-radius: 10px;
    transition: background 0.15s ease, transform 0.05s ease;
  }
  button:hover { background: #212a1b; }
  button:active { transform: translateY(1px); }
  button.primary {
    background: linear-gradient(135deg, var(--accent), #3c7a24);
    border-color: transparent;
  }
  button.primary:hover { filter: brightness(1.08); }
  button.danger { color: var(--danger); }

  .settings {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .settings label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  #keyDisplay {
    width: 110px;
    background: #0e130c;
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 8px 10px;
    font-family: ui-monospace, "Cascadia Code", monospace;
    font-size: 13px;
    color: var(--accent);
    text-align: center;
    cursor: pointer;
    transition: border-color 0.12s ease;
  }
  #keyDisplay:hover { border-color: var(--accent); }
  #keyDisplay.listening {
    color: var(--accent-2);
    border-color: var(--accent-2);
    box-shadow: 0 0 0 2px rgba(124,92,255,0.2);
    cursor: default;
  }

  /* ---------- GIF Maker ---------- */
  .gif-wrap {
    width: 100%;
    max-width: 620px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .gif-row { display: flex; align-items: center; gap: 12px; }
  .gif-info {
    flex: 1;
    font-size: 13px;
    color: var(--muted);
    background: #0e130c;
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 9px 12px;
    font-family: ui-monospace, "Cascadia Code", monospace;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .gif-controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--muted);
  }
  .field input {
    background: #0e130c;
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 8px 10px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
  }
  .field input:focus { outline: none; border-color: var(--accent); }
  .keycap {
    align-self: flex-start;
    min-width: 96px;
    text-align: center;
    background: #0e130c;
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 8px 12px;
    font-family: ui-monospace, "Cascadia Code", monospace;
    font-size: 13px;
    color: var(--accent);
    cursor: pointer;
    transition: border-color 0.12s ease;
  }
  .keycap:hover { border-color: var(--accent); }
  .keycap.listening {
    color: var(--accent-2);
    border-color: var(--accent-2);
    box-shadow: 0 0 0 2px rgba(124,92,255,0.2);
  }
  .frames-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
  }
  .frames-head b { color: var(--text); font-size: 15px; }
  .frames-btns { display: flex; gap: 8px; }
  .film {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    min-height: 74px;
    padding: 8px;
    background: #0a0d08;
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .film-frame {
    height: 58px;
    border-radius: 6px;
    border: 1px solid var(--border);
    flex: 0 0 auto;
  }
  .film:empty::after {
    content: "Captured frames appear here";
    color: var(--muted);
    font-size: 12px;
    margin: auto;
  }
  .gif-actions { display: flex; align-items: center; gap: 14px; }
  .gif-actions button.primary { font-size: 15px; padding: 10px 20px; }
  .gif-status {
    font-size: 12px;
    color: var(--muted);
    font-family: ui-monospace, "Cascadia Code", monospace;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  /* ---------- Quality ---------- */
  .q-wrap {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    flex: 1;
  }
  .q-conn {
    font-size: 12px;
    color: var(--muted);
    background: #0e130c;
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 9px 12px;
    line-height: 1.5;
  }
  .q-conn b { color: var(--accent-2); font-family: ui-monospace, monospace; }
  .q-conn code {
    color: var(--accent);
    background: #0a0d08;
    padding: 1px 6px;
    border-radius: 5px;
    font-family: ui-monospace, monospace;
  }
  .q-section {
    background: #0a0d08;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }
  .q-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .q-sub { font-size: 12px; color: var(--muted); font-weight: 500; }
  .q-sub input {
    width: 48px;
    background: #0e130c;
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    padding: 3px 6px;
    font: inherit;
    font-size: 12px;
    text-align: center;
  }
  .q-bars { display: flex; flex-direction: column; gap: 8px; }
  .q-bar-row {
    display: grid;
    grid-template-columns: 38px 1fr 120px 30px;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }
  .q-badge {
    font-size: 10px;
    font-weight: 700;
    text-align: center;
    border-radius: 5px;
    padding: 2px 0;
    letter-spacing: 0.5px;
  }
  .q-badge.q-major { color: #ff8088; background: rgba(255,92,108,0.16); }
  .q-badge.q-minor { color: #ffc06b; background: rgba(255,177,92,0.16); }
  .q-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .q-track { height: 8px; background: #1a2015; border-radius: 5px; overflow: hidden; }
  .q-fill { display: block; height: 100%; border-radius: 5px; }
  .q-fill.q-major { background: #ff5c6c; }
  .q-fill.q-minor { background: #ffb15c; }
  .q-num { text-align: right; font-variant-numeric: tabular-nums; color: var(--muted); }
  .q-clip {
    font-size: 12px;
    color: var(--muted);
    font-family: ui-monospace, monospace;
    margin-bottom: 10px;
  }
  .q-check { display: flex; flex-direction: column; gap: 7px; }
  .q-item {
    display: flex;
    align-items: center;
    gap: 9px;
    font-size: 13px;
    cursor: pointer;
    padding: 2px 0;
  }
  .q-item input { accent-color: var(--accent-2); width: 15px; height: 15px; }
  .q-item em { color: var(--muted); font-style: normal; font-size: 12px; }
  .q-item.done span { text-decoration: line-through; color: var(--muted); }
  .q-empty { font-size: 12px; color: var(--muted); padding: 6px 2px; }
  .q-actions { display: flex; align-items: center; gap: 10px; margin-top: auto; }
  .q-status {
    flex: 1;
    text-align: right;
    font-size: 12px;
    color: var(--muted);
    font-family: ui-monospace, monospace;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <!-- ---------- Sidebar ---------- -->
  <aside class="sidebar">
    <div class="brand">
      <h1>OROCHI</h1>
    </div>
    <nav class="nav" id="nav">
      <div class="nav-item active" data-tool="counter">
        <span class="icon">#</span>
        <span>Counter</span>
      </div>
      <div class="nav-item" data-tool="gif">
        <span class="icon">▦</span>
        <span>GIF Maker</span>
      </div>
      <div class="nav-item" data-tool="quality">
        <span class="icon">✓</span>
        <span>Quality</span>
      </div>
    </nav>
    <div class="footer">v0.3.0</div>
  </aside>

  <!-- ---------- Content ---------- -->
  <main class="content">

    <!-- Counter -->
    <section class="tool active" data-tool="counter">
      <button class="danger reset-top" id="reset">Reset</button>
      <div class="count" id="count">0</div>

      <div class="settings">
        <label for="keyDisplay">Hotkey</label>
        <div id="keyDisplay" tabindex="0" title="Click to rebind">Space</div>
      </div>
    </section>

    <!-- GIF Maker -->
    <section class="tool" data-tool="gif">
      <div class="gif-wrap">

        <div class="gif-row">
          <button id="gifSelect" class="primary">Select Region</button>
          <div class="gif-info" id="gifRegion">No region selected — full screen</div>
        </div>

        <div class="gif-controls">
          <div class="field">
            <label>Capture hotkey</label>
            <div id="gifHotkey" class="keycap" title="Click to rebind">F8</div>
          </div>
          <div class="field">
            <label>Frame delay (ms)</label>
            <input id="gifDelay" type="number" min="1" step="10" value="200">
          </div>
          <div class="field">
            <label>Max width (px, 0 = full)</label>
            <input id="gifMax" type="number" min="0" step="20" value="600">
          </div>
          <div class="field">
            <label>File name</label>
            <input id="gifFile" type="text" value="orochi.gif">
          </div>
        </div>

        <div class="gif-row">
          <button id="gifPickOut">Output Folder…</button>
          <div class="gif-info" id="gifOut">Not set</div>
        </div>

        <div class="frames-head">
          <span>Frames: <b id="gifCount">0</b></span>
          <div class="frames-btns">
            <button id="gifCapture">Capture frame</button>
            <button id="gifClear" class="danger">Clear</button>
          </div>
        </div>

        <div class="film" id="gifFilm"></div>

        <div class="gif-actions">
          <button id="gifGenerate" class="primary">Generate GIF</button>
          <div id="gifStatus" class="gif-status"></div>
        </div>

      </div>
    </section>

    <!-- Quality -->
    <section class="tool" data-tool="quality">
      <div class="q-wrap">

        <div class="q-section">
          <div class="q-head"><span>Mistakes</span></div>
          <div class="q-bars" id="qBars"></div>
        </div>

        <div class="q-section">
          <div class="q-head"><span>Checklist</span></div>
          <div class="q-check" id="qCheck"></div>
        </div>

        <div class="q-actions">
          <button id="qRefresh">Refresh</button>
          <button id="qResetCheck">Reset checklist</button>
          <button id="qClear" class="danger">Clear all data</button>
        </div>

      </div>
    </section>

  </main>

<script>
/* ---------- Sidebar navigation ---------- */
(function () {
  "use strict";
  var ACTIVE_KEY = "orochi.activeTool.v1";
  var navItems = document.querySelectorAll(".nav-item");
  var tools = document.querySelectorAll(".tool");

  function activate(name) {
    navItems.forEach(function (n) {
      n.classList.toggle("active", n.getAttribute("data-tool") === name);
    });
    tools.forEach(function (t) {
      t.classList.toggle("active", t.getAttribute("data-tool") === name);
    });
    try { localStorage.setItem(ACTIVE_KEY, name); } catch (e) {}
  }

  navItems.forEach(function (n) {
    n.addEventListener("click", function () {
      activate(n.getAttribute("data-tool"));
    });
  });

  // Restore last-open tool.
  try {
    var saved = localStorage.getItem(ACTIVE_KEY);
    if (saved && document.querySelector('.tool[data-tool="' + saved + '"]')) {
      activate(saved);
    }
  } catch (e) {}
})();

/* ---------- Counter ---------- */
(function () {
  "use strict";

  var STORAGE_KEY = "orochi.tracker.v1";

  var state = {
    count: 0,
    hotkey: { key: " ", label: "Space" }
  };

  var countEl = document.getElementById("count");
  var keyDisplayEl = document.getElementById("keyDisplay");
  var resetBtn = document.getElementById("reset");

  var listeningForKey = false;

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var saved = JSON.parse(raw);
        if (typeof saved.count === "number") state.count = saved.count;
        if (saved.hotkey && saved.hotkey.key) state.hotkey = saved.hotkey;
      }
    } catch (e) { /* ignore corrupt storage */ }
  }

  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) { /* storage may be unavailable */ }
  }

  function render() {
    countEl.textContent = state.count;
    keyDisplayEl.textContent = state.hotkey.label;
  }

  function bump() {
    countEl.classList.remove("bump");
    void countEl.offsetWidth; // force reflow so the animation restarts
    countEl.classList.add("bump");
  }

  function increment() {
    state.count++;
    render();
    bump();
    save();
  }

  function reset() {
    state.count = 0;
    render();
    save();
  }

  // Turn a keydown event into a stored key + a friendly label.
  function describeKey(e) {
    var key = e.key;
    var label;
    if (key === " ") label = "Space";
    else if (key === "ArrowUp") label = "↑";
    else if (key === "ArrowDown") label = "↓";
    else if (key === "ArrowLeft") label = "←";
    else if (key === "ArrowRight") label = "→";
    else if (key === "Enter") label = "Enter";
    else if (key.length === 1) label = key.toUpperCase();
    else label = key;
    return { key: key, label: label };
  }

  function startListening() {
    listeningForKey = true;
    keyDisplayEl.classList.add("listening");
    keyDisplayEl.textContent = "Press a key…";
    keyDisplayEl.focus();
  }

  function stopListening() {
    listeningForKey = false;
    keyDisplayEl.classList.remove("listening");
    render();
  }

  document.addEventListener("keydown", function (e) {
    if (listeningForKey) {
      // Escape cancels the rebind without changing anything.
      if (e.key !== "Escape") {
        state.hotkey = describeKey(e);
        save();
      }
      e.preventDefault();
      stopListening();
      return;
    }

    // Only count while the Counter tool is visible.
    var counterVisible = document.querySelector('.tool[data-tool="counter"]').classList.contains("active");
    if (!counterVisible) return;

    // Ignore the hotkey while typing in an input.
    var tag = (e.target && e.target.tagName) || "";
    if (tag === "INPUT" || tag === "TEXTAREA") return;

    if (e.key === state.hotkey.key) {
      e.preventDefault();
      increment();
    }
  });

  resetBtn.addEventListener("click", reset);
  keyDisplayEl.addEventListener("click", function () {
    if (listeningForKey) stopListening();
    else startListening();
  });

  load();
  render();
})();

/* ---------- GIF Maker (desktop / Tauri only) ---------- */
(function () {
  "use strict";
  if (!window.__TAURI__) return; // Counter still works when opened outside the app.

  var invoke = window.__TAURI__.core.invoke;
  var listen = window.__TAURI__.event.listen;
  var $ = function (id) { return document.getElementById(id); };

  var KEY = "orochi.gif.v1";
  var cfg = { outputDir: "", hotkey: "F8", delay: 200, maxWidth: 600, filename: "orochi.gif" };
  try {
    var s = JSON.parse(localStorage.getItem(KEY));
    if (s) Object.assign(cfg, s);
  } catch (e) {}

  var els = {
    region: $("gifRegion"), count: $("gifCount"), film: $("gifFilm"),
    out: $("gifOut"), hot: $("gifHotkey"), delay: $("gifDelay"),
    max: $("gifMax"), file: $("gifFile"), status: $("gifStatus"),
    selBtn: $("gifSelect"), capBtn: $("gifCapture"), clrBtn: $("gifClear"),
    genBtn: $("gifGenerate"), outBtn: $("gifPickOut")
  };

  function persist() { try { localStorage.setItem(KEY, JSON.stringify(cfg)); } catch (e) {} }
  function setCount(n) { els.count.textContent = n; }
  function setStatus(msg, ok) {
    els.status.textContent = msg;
    els.status.style.color = ok ? "var(--accent-2)" : "var(--muted)";
  }
  function regionLabel(r) { return r.w + " × " + r.h + "  @ (" + r.x + ", " + r.y + ")"; }
  function addThumb(src) {
    var img = document.createElement("img");
    img.src = src;
    img.className = "film-frame";
    els.film.appendChild(img);
    els.film.scrollLeft = els.film.scrollWidth;
  }

  // Hydrate fields from saved config.
  els.delay.value = cfg.delay;
  els.max.value = cfg.maxWidth;
  els.file.value = cfg.filename;
  els.out.textContent = cfg.outputDir || "Not set";
  els.hot.textContent = cfg.hotkey;

  // Sync with backend state and (re)apply a saved hotkey.
  (async function () {
    try {
      var st = await invoke("get_state");
      if (st) {
        setCount(st.frame_count);
        if (st.region) els.region.textContent = regionLabel(st.region);
        if (st.hotkey) { cfg.hotkey = st.hotkey; els.hot.textContent = st.hotkey; }
      }
      if (cfg.hotkey && cfg.hotkey !== "F8") {
        await invoke("set_hotkey", { accelerator: cfg.hotkey });
      }
    } catch (e) {}
  })();

  els.selBtn.addEventListener("click", function () {
    invoke("select_region").catch(function (e) { setStatus(String(e)); });
  });
  els.capBtn.addEventListener("click", function () {
    invoke("capture_frame").catch(function (e) { setStatus(String(e)); });
  });
  els.clrBtn.addEventListener("click", async function () {
    try { await invoke("clear_frames"); els.film.innerHTML = ""; setCount(0); setStatus("Frames cleared"); }
    catch (e) { setStatus(String(e)); }
  });
  els.outBtn.addEventListener("click", async function () {
    try {
      var dir = await invoke("pick_output_dir");
      if (dir) { cfg.outputDir = dir; els.out.textContent = dir; persist(); }
    } catch (e) { setStatus(String(e)); }
  });
  els.delay.addEventListener("change", function () {
    cfg.delay = Math.max(1, parseInt(els.delay.value, 10) || 200);
    els.delay.value = cfg.delay; persist();
  });
  els.max.addEventListener("change", function () {
    cfg.maxWidth = Math.max(0, parseInt(els.max.value, 10) || 0);
    els.max.value = cfg.maxWidth; persist();
  });
  els.file.addEventListener("change", function () {
    cfg.filename = els.file.value.trim() || "orochi.gif"; persist();
  });

  els.genBtn.addEventListener("click", async function () {
    if (!cfg.outputDir) { setStatus("Pick an output folder first"); return; }
    setStatus("Generating…");
    try {
      var path = await invoke("generate_gif", {
        outputDir: cfg.outputDir,
        delayMs: cfg.delay,
        maxWidth: cfg.maxWidth,
        filename: cfg.filename
      });
      setStatus("Saved → " + path, true);
    } catch (e) { setStatus(String(e)); }
  });

  // Hotkey rebind.
  var listening = false;
  els.hot.addEventListener("click", function () {
    if (listening) return;
    listening = true;
    els.hot.classList.add("listening");
    els.hot.textContent = "Press keys…";
  });

  function eventToAccelerator(e) {
    var mods = [];
    if (e.ctrlKey) mods.push("Control");
    if (e.altKey) mods.push("Alt");
    if (e.shiftKey) mods.push("Shift");
    if (e.metaKey) mods.push("Super");
    var k = e.key;
    if (["Control", "Shift", "Alt", "Meta"].indexOf(k) !== -1) return null;
    if (k === " ") k = "Space";
    else if (/^[a-z]$/i.test(k)) k = k.toUpperCase();
    else if (k === "ArrowUp") k = "Up";
    else if (k === "ArrowDown") k = "Down";
    else if (k === "ArrowLeft") k = "Left";
    else if (k === "ArrowRight") k = "Right";
    return mods.concat(k).join("+");
  }

  document.addEventListener("keydown", async function (e) {
    if (!listening) return;
    e.preventDefault();
    if (e.key === "Escape") {
      listening = false;
      els.hot.classList.remove("listening");
      els.hot.textContent = cfg.hotkey;
      return;
    }
    var acc = eventToAccelerator(e);
    if (!acc) return; // modifier-only press: keep waiting
    listening = false;
    els.hot.classList.remove("listening");
    try {
      await invoke("set_hotkey", { accelerator: acc });
      cfg.hotkey = acc;
      els.hot.textContent = acc;
      persist();
      setStatus("Hotkey set to " + acc);
    } catch (err) {
      els.hot.textContent = cfg.hotkey;
      setStatus(String(err));
    }
  });

  // Backend events.
  listen("frame-captured", function (ev) {
    var p = ev.payload || {};
    setCount(p.count);
    if (p.thumb) addThumb(p.thumb);
  });
  listen("region-updated", function (ev) {
    els.region.textContent = regionLabel(ev.payload);
  });
  listen("frames-cleared", function () {
    setCount(0);
    els.film.innerHTML = "";
  });
})();

/* ---------- Quality (desktop / Tauri only) ---------- */
(function () {
  "use strict";
  if (!window.__TAURI__) return;

  var invoke = window.__TAURI__.core.invoke;
  var listen = window.__TAURI__.event.listen;
  var $ = function (id) { return document.getElementById(id); };

  // Mistake taxonomy + parser — a direct port of MadCat's pure functions, so
  // Orochi tallies identically. (Userscript forwards raw comments; we parse.)
  var TAXONOMY = [
    { id: "missing_event",      severity: "major", label: "Missing Event",                        match: "Missing Event - Please Add" },
    { id: "missing_modifier",   severity: "major", label: "Missing Modifier",                     match: "Missing Modifier- Please add" },
    { id: "unnecessary_triage", severity: "major", label: "Unnecessary Triage Tag",               match: "Unnecessary Triage Tag" },
    { id: "event_start_off",    severity: "major", label: "Incorrect Event Start (> .25s)",        match: "Incorrect Event Start > .25s - Please Fix" },
    { id: "event_end_off",      severity: "major", label: "Incorrect Event End (> .25s)",          match: "Incorrect Event End > .25s - Please Fix" },
    { id: "desc_scroll",        severity: "major", label: "Incorrect Scroll Event Description",    match: "Incorrect Event Description on Scroll Event - Please Fix" },
    { id: "desc_wrong_action",  severity: "major", label: "Incorrect Action Described",            match: "Incorrect Event Description - Incorrect Action Described- Please Fix" },
    { id: "desc_missing_key",   severity: "major", label: "Missing Key Press (in description)",     match: "Incorrect Event Description - Missing Key Press - Please Fix" },
    { id: "desc_generic",       severity: "major", label: "Incorrect Event Description",           match: "Incorrect Event Description - Please Fix" },
    { id: "unnecessary_event",  severity: "minor", label: "Unnecessary Event",                     match: "Unnecessary Event - Please Remove" },
    { id: "incorrect_grammar",  severity: "minor", label: "Incorrect Grammar",                     match: "Incorrect Grammar - Please Fix" },
    { id: "too_descriptive",    severity: "minor", label: "Too Descriptive Event",                 match: "Too Descriptive Event - Please Fix" },
    { id: "missing_triage",     severity: "minor", label: "Missing Triage Tag",                    match: "Missing Triage Tag NOT BAD DATA" },
    { id: "bad_modifier",       severity: "minor", label: "Incorrect/Unnecessary Modifier Used",   match: "Incorrect/Unnecessary Modifier Used - Please Fix" }
  ];
  function entryById(id) {
    for (var i = 0; i < TAXONOMY.length; i++) if (TAXONOMY[i].id === id) return TAXONOMY[i];
    return null;
  }
  function normMistake(s) {
    return String(s == null ? "" : s).toLowerCase()
      .replace(/\s*-\s*/g, " - ").replace(/\s+/g, " ").trim();
  }
  function looksLikeMistake(n) { return n.indexOf("mistake type:") !== -1; }
  function countMatches(norm) {
    var ids = [];
    for (var i = 0; i < TAXONOMY.length; i++) {
      var needle = normMistake(TAXONOMY[i].match);
      if (!needle) continue;
      var idx = 0;
      while ((idx = norm.indexOf(needle, idx)) !== -1) { ids.push(TAXONOMY[i].id); idx += needle.length; }
    }
    return ids;
  }
  function parseComments(list) {
    var byCategory = {}, uncategorized = 0;
    (list || []).forEach(function (raw) {
      var norm = normMistake(raw);
      var ids = countMatches(norm);
      if (ids.length) ids.forEach(function (id) { byCategory[id] = (byCategory[id] || 0) + 1; });
      else if (looksLikeMistake(norm)) uncategorized++;
    });
    return { byCategory: byCategory, uncategorized: uncategorized };
  }

  // UI-side state (checklist + topN) persists locally; the comment data lives
  // in the Rust store.
  var KEY = "orochi.quality.v1";
  var ui = { topN: 5, checked: {}, clipId: null };
  try { var s = JSON.parse(localStorage.getItem(KEY)); if (s) Object.assign(ui, s); } catch (e) {}
  function persist() { try { localStorage.setItem(KEY, JSON.stringify(ui)); } catch (e) {} }

  var els = {
    bars: $("qBars"), check: $("qCheck"),
    refresh: $("qRefresh"), resetCheck: $("qResetCheck"), clear: $("qClear")
  };

  var store = { version: 1, clips: {} };

  function aggregate() {
    var totals = {}, uncategorized = 0, clipCount = 0, latest = null, latestTs = -1;
    var clips = store.clips || {};
    Object.keys(clips).forEach(function (cid) {
      var entry = clips[cid]; clipCount++;
      var parsed = parseComments(entry.comments);
      Object.keys(parsed.byCategory).forEach(function (k) { totals[k] = (totals[k] || 0) + parsed.byCategory[k]; });
      uncategorized += parsed.uncategorized;
      if ((entry.ts || 0) > latestTs) { latestTs = entry.ts || 0; latest = cid; }
    });
    return { totals: totals, uncategorized: uncategorized, clipCount: clipCount, latest: latest };
  }

  function render() {
    var agg = aggregate();
    var totals = agg.totals;

    var ranked = Object.keys(totals).filter(function (id) { return totals[id] > 0; })
      .sort(function (a, b) { return totals[b] - totals[a]; });
    var max = ranked.length ? totals[ranked[0]] : 1;
    els.bars.innerHTML = "";
    if (!ranked.length) {
      els.bars.innerHTML = '<div class="q-empty">No mistakes recorded yet. Open a clip in the labeling app with the Orochi userscript active.</div>';
    } else {
      ranked.forEach(function (id) {
        var e = entryById(id);
        var sev = e ? e.severity : "minor";
        var pct = Math.round((totals[id] / max) * 100);
        var row = document.createElement("div");
        row.className = "q-bar-row";
        row.innerHTML =
          '<span class="q-badge q-' + sev + '">' + (sev === "major" ? "MAJ" : "MIN") + '</span>' +
          '<span class="q-label"></span>' +
          '<span class="q-track"><span class="q-fill q-' + sev + '" style="width:' + pct + '%"></span></span>' +
          '<span class="q-num">' + totals[id] + '</span>';
        row.querySelector(".q-label").textContent = e ? e.label : id;
        els.bars.appendChild(row);
      });
    }

    // Checklist is scoped to the most recently ingested clip; a new clip resets it.
    if (ui.clipId !== agg.latest) { ui.clipId = agg.latest; ui.checked = {}; persist(); }

    var weak = Object.keys(totals).filter(function (id) { return totals[id] > 0; })
      .sort(function (a, b) { return totals[b] - totals[a]; }).slice(0, ui.topN);
    els.check.innerHTML = "";
    if (!weak.length) {
      els.check.innerHTML = '<div class="q-empty">Nothing to review yet.</div>';
    } else {
      weak.forEach(function (id) {
        var e = entryById(id);
        var item = document.createElement("label");
        item.className = "q-item" + (ui.checked[id] ? " done" : "");
        var cb = document.createElement("input");
        cb.type = "checkbox"; cb.checked = !!ui.checked[id];
        cb.addEventListener("change", function () {
          if (cb.checked) ui.checked[id] = true; else delete ui.checked[id];
          item.classList.toggle("done", cb.checked);
          persist();
        });
        var span = document.createElement("span");
        var em = document.createElement("em");
        em.textContent = "  " + totals[id];
        span.textContent = e ? e.label : id;
        span.appendChild(em);
        item.appendChild(cb); item.appendChild(span);
        els.check.appendChild(item);
      });
    }
  }

  async function reload() {
    try { store = (await invoke("quality_get_all")) || { clips: {} }; }
    catch (e) { store = { clips: {} }; }
    render();
  }

  els.refresh.addEventListener("click", function () { reload(); });
  els.resetCheck.addEventListener("click", function () {
    ui.checked = {}; persist(); render();
  });

  // Two-click confirm (avoids relying on window.confirm in the webview).
  var clearArmed = false;
  els.clear.addEventListener("click", async function () {
    if (!clearArmed) {
      clearArmed = true;
      els.clear.textContent = "Click again to erase";
      setTimeout(function () { clearArmed = false; els.clear.textContent = "Clear all data"; }, 3000);
      return;
    }
    clearArmed = false; els.clear.textContent = "Clear all data";
    try {
      await invoke("quality_clear");
      ui.checked = {}; ui.clipId = null; persist();
      await reload();
    } catch (e) { console.warn(e); }
  });

  listen("quality-updated", function () {
    reload();
  });

  reload();
})();
</script>
</body>
